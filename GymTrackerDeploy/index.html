        .wk-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;padding:18px 20px 0;}
        .st-box{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:14px 12px;text-align:center;}
        .st-v{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;}
        .st-v.acc{color:var(--acc);}
        .st-l{font-size:11px;color:var(--tx-m);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;font-weight:700;}
        .wk-series{display:flex;align-items:center;gap:8px;padding:16px 20px 0;flex-wrap:wrap;}
        .sp{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid var(--b);color:var(--tx-m);transition:all .15s;flex-shrink:0;}
        .sp.done{background:var(--acc);border-color:var(--acc);color:#000;}
        .sp.curr{background:transparent;border-color:var(--acc);color:var(--acc);}
        .sp.todo{background:var(--s1);}
        .wk-note{padding:11px 20px 0;font-size:13px;color:var(--tx-m);font-style:italic;}
        .nxt-prev{margin:16px 20px 0;padding:13px 15px;background:var(--s1);border:1px solid var(--b);border-radius:var(--r);display:flex;align-items:center;gap:12px;}
        .nxt-thumb{width:48px;height:35px;object-fit:cover;border-radius:6px;background:var(--s2);flex-shrink:0;}
        .nxt-lbl{font-size:11px;color:var(--tx-m);text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
        .nxt-n{font-size:14px;font-weight:700;}
        .nxt-s{font-size:12px;color:var(--tx-d);margin-top:1px;}
        .wk-acts{padding:20px;display:flex;flex-direction:column;gap:10px;margin-top:auto;}
        .btn-done{background:var(--acc);color:#000;border:none;border-radius:var(--r);padding:19px;font-weight:900;font-size:16px;cursor:pointer;transition:all .13s;letter-spacing:.03em;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-tap-highlight-color:transparent;width:100%;}
        .btn-done:active{transform:scale(.98);}
        .btn-done:hover{background:#d6ff1a;}
        .wk-acts{padding:20px;display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
        .btn-skip{background:var(--s1);border:1px solid var(--b);color:var(--tx-d);border-radius:var(--r);padding:14px;font-weight:600;font-size:14px;cursor:pointer;transition:all .13s;-webkit-tap-highlight-color:transparent;width:100%;}
        .btn-skip:hover{border-color:var(--tx-d);color:var(--tx);}
        .rest-ov{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;animation:fi .2s ease;}
        @keyframes fi{from{opacity:0}to{opacity:1}}
        .rest-lbl{font-size:12px;font-weight:700;color:var(--tx-m);text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px;}
        .rest-t{font-family:'Bebas Neue',sans-serif;font-size:128px;line-height:1;color:var(--acc);letter-spacing:-.02em;transition:color .3s;}
        .rest-t.urg{color:var(--red);}
        .rest-nxt{margin-top:28px;text-align:center;}
        .rest-nxt-lbl{font-size:12px;color:var(--tx-m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:700;}
        .rest-nxt-n{font-family:'Bebas Neue',sans-serif;font-size:30px;}
        .rest-acts{margin-top:40px;width:100%;max-width:270px;}
        .done-pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
        .done-ico{font-size:80px;margin-bottom:22px;animation:bnc .5s ease;}
        @keyframes bnc{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
        .done-t{font-family:'Bebas Neue',sans-serif;font-size:58px;line-height:.95;margin-bottom:12px;}
        .done-s{color:var(--tx-d);font-size:15px;line-height:1.6;margin-bottom:40px;}
        .empty{text-align:center;padding:48px 24px;color:var(--tx-m);}
        .empty-ic{font-size:44px;margin-bottom:14px;}
        .empty-t{font-size:14px;line-height:1.7;}
        `;

    function GymTracker() {
      const [scheda, setScheda] = useState(buildDefault());
      const [view, setView] = useState('home');
      const [isLoading, setIsLoading] = useState(true);

      // Caricamento dal Database (o LocalStorage come fallback)
      useEffect(() => {
        const loadData = async () => {
          try {
            if (SUPABASE_URL.includes("INSERISCI_QUI")) throw new Error("Supabase non ancora configurato.");
            const { data, error } = await supabase.from('gym_data').select('content').eq('id', 1).single();

            if (error && error.code !== 'PGRST116') throw error; // Ignora eccezione se non trova nessuna riga (0 rows)

            if (data && data.content) {
              setScheda(data.content);
            } else {
              const s = localStorage.getItem('gym_v3');
              if (s) setScheda(JSON.parse(s));
            }
          } catch (e) {
            console.error("Avviso: Impossibile caricare da Supabase (fallito o non configurato) -> fallback su LocalStorage locale", e);
            const s = localStorage.getItem('gym_v3');
            if (s) setScheda(JSON.parse(s));
          } finally {
            setIsLoading(false);
          }
        };
        loadData();
      }, []);

      // Salvataggio nel Database Supabase + LocalStorage
      useEffect(() => {
        if (isLoading) return;
        localStorage.setItem('gym_v3', JSON.stringify(scheda));

        const saveData = async () => {
          try {
            if (SUPABASE_URL.includes("INSERISCI_QUI")) return;

            const { error } = await supabase
              .from('gym_data')
              .upsert({ id: 1, content: scheda }, { onConflict: 'id' });

            if (error) throw error;
          } catch (e) {
            console.error("Errore salvataggio Supabase:", e);
          }
        };
        saveData();
      }, [scheda, isLoading]);

      const [selGiornoId, setSelGiornoId] = useState(null);
      const [editModal, setEditModal] = useState(null);
      const [wGiornoId, setWGiornoId] = useState(null);
      const [exIdx, setExIdx] = useState(0);
      const [serieIdx, setSerieIdx] = useState(0);
      const [isResting, setIsResting] = useState(false);
      const [restTime, setRestTime] = useState(0);
      const [imgIdx, setImgIdx] = useState(0);
      const timerRef = useRef(null);
      const targetTimeRef = useRef(0);
      const advRef = useRef(null);
      advRef.current = () => {
        if (!wGiorno) return;
        const ex = wGiorno.esercizi[exIdx];
        const prevEx = exIdx > 0 ? wGiorno.esercizi[exIdx - 1] : null;

        if (prevEx && prevEx.superset) {
          if (serieIdx + 1 < prevEx.serie) {
            setExIdx(exIdx - 1);
            setSerieIdx(s => s + 1);
            setImgIdx(0);
            return;
          }
          if (exIdx + 1 < wGiorno.esercizi.length) {
            setExIdx(exIdx + 1);
            setSerieIdx(0);
            setImgIdx(0);
          } else {
            setView('complete');
          }
          return;
        }

        if (serieIdx + 1 < (ex?.serie || 1)) {
          setSerieIdx(s => s + 1);
          setImgIdx(0);
        } else if (exIdx + 1 < wGiorno.esercizi.length) {
          setExIdx(e => e + 1);
          setSerieIdx(0);
          setImgIdx(0);
        } else {
          setView('complete');
        }
      };
      useEffect(() => {
        if (!isResting) return;
        
        const tick = () => {
          const now = Date.now();
          const remaining = Math.max(0, Math.ceil((targetTimeRef.current - now) / 1000));
          
          if (remaining > 0) {
            setRestTime(remaining);
            timerRef.current = setTimeout(tick, 500); 
          } else {
            setRestTime(0);
            setIsResting(false);
            advRef.current();
          }
        };

        timerRef.current = setTimeout(tick, 100);
        return () => clearTimeout(timerRef.current);
      }, [isResting]);
      const wGiorno = scheda.giorni.find(g => g.id === wGiornoId);
      const currEx = wGiorno?.esercizi[exIdx];
      const nextEx = wGiorno?.esercizi[exIdx + 1];
      const selGiorno = scheda.giorni.find(g => g.id === selGiornoId);
      const startWorkout = (giornoId) => {
        setWGiornoId(giornoId); setExIdx(0); setSerieIdx(0);
        setIsResting(false); setImgIdx(0); setView('workout');
      };
      const completeSerie = () => {
        const ex = wGiorno?.esercizi[exIdx];
        if (!ex) return;
        
        if (ex.superset && exIdx + 1 < wGiorno.esercizi.length) {
          setExIdx(exIdx + 1);
          setImgIdx(0);
          return;
        }
        
        const isLastS = serieIdx + 1 >= ex.serie;
        const isLastEx = exIdx + 1 >= wGiorno.esercizi.length;
        if (isLastS && isLastEx) { setView('complete'); return; }
        
        const t = ex.recupero || 60;
        setRestTime(t);
        targetTimeRef.current = Date.now() + t * 1000;
        setIsResting(true);
      };
      const skipRest = () => { clearTimeout(timerRef.current); setIsResting(false); advRef.current(); };
      const updSchedaNome = (v) => setScheda(s => ({ ...s, nome: v }));
      const addGiorno = () => setScheda(s => ({ ...s, giorni: [...s.giorni, { id: uid(), nome: `Giorno ${s.giorni.length + 1}`, esercizi: [] }] }));
      const delGiorno = (id) => setScheda(s => ({ ...s, giorni: s.giorni.filter(g => g.id !== id) }));
      const updGiornoNome = (id, v) => setScheda(s => ({ ...s, giorni: s.giorni.map(g => g.id === id ? { ...g, nome: v } : g) }));
      const addEsercizio = (gId, preset) => {
        const e = preset ? { id: uid(), nome: preset.nome, imgs: [...preset.imgs], serie: 3, ripetizioni: "10", peso: 0, recupero: 90, note: "" }
          : { id: uid(), nome: "Nuovo Esercizio", imgs: [], serie: 3, ripetizioni: "10", peso: 0, recupero: 90, note: "" };
        setScheda(s => ({ ...s, giorni: s.giorni.map(g => g.id === gId ? { ...g, esercizi: [...g.esercizi, e] } : g) }));
        return e.id;
      };
      const updEsercizio = (gId, eId, data) => setScheda(s => ({ ...s, giorni: s.giorni.map(g => g.id === gId ? { ...g, esercizi: g.esercizi.map(e => e.id === eId ? { ...e, ...data } : e) } : g) }));
      const delEsercizio = (gId, eId) => setScheda(s => ({ ...s, giorni: s.giorni.map(g => g.id === gId ? { ...g, esercizi: g.esercizi.filter(e => e.id !== eId) } : g) }));
      const moveEsercizio = (gId, eId, dir) => setScheda(s => ({
        ...s, giorni: s.giorni.map(g => {
          if (g.id !== gId) return g;
          const a = [...g.esercizi]; const i = a.findIndex(e => e.id === eId);
          if (dir === 'up' && i > 0) [a[i - 1], a[i]] = [a[i], a[i - 1]];
          if (dir === 'down' && i < a.length - 1) [a[i], a[i + 1]] = [a[i + 1], a[i]];
          return { ...g, esercizi: a };
        })
      }));
      const editEx = editModal ? scheda.giorni.find(g => g.id === editModal.gId)?.esercizi.find(e => e.id === editModal.eId) : null;
      return (
        <div className="app">
          <style>{CSS}</style>
          {view === 'home' && (
            <HomeView schedaNome={scheda.nome} hasGiorni={scheda.giorni.length > 0}
              onScheda={() => setView('scheda')}
              onStart={() => { if (scheda.giorni.length === 1) startWorkout(scheda.giorni[0].id); else setView('daySelect'); }} />
          )}
          {view === 'scheda' && (
            <SchedaView scheda={scheda} onBack={() => setView('home')}
              onUpdNome={updSchedaNome} onAdd={addGiorno} onDel={delGiorno}
              onSel={(id) => { setSelGiornoId(id); setView('giorno'); }}
              onStart={startWorkout} />
          )}
          {view === 'giorno' && selGiorno && (
            <GiornoView giorno={selGiorno} onBack={() => setView('scheda')}
              onUpdNome={(v) => updGiornoNome(selGiorno.id, v)}
              onAdd={(p) => { const eId = addEsercizio(selGiorno.id, p); setEditModal({ gId: selGiorno.id, eId }); }}
              onEdit={(eId) => setEditModal({ gId: selGiorno.id, eId })}
              onDel={(eId) => delEsercizio(selGiorno.id, eId)}
              onMove={(eId, d) => moveEsercizio(selGiorno.id, eId, d)}
              onStart={() => startWorkout(selGiorno.id)} />
          )}
          {view === 'daySelect' && (
            <div className="mb" onClick={() => setView('home')}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ padding: '24px 20px 44px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <div className="m-title" style={{ marginBottom: 0 }}>Scegli il Giorno</div>
                  <button className="btn btn-ic" onClick={() => setView('home')}>✕</button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {scheda.giorni.map(g => (
                    <div key={g.id} className="ds-item" onClick={() => { setView('home'); startWorkout(g.id); }}>
                      <div><div className="ds-name">{g.nome}</div><div className="ds-meta">{g.esercizi.length} esercizi</div></div>
                      <span style={{ color: 'var(--acc)', fontSize: 22 }}>▶</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
          {view === 'workout' && wGiorno && (
            <>
              <WorkoutView giorno={wGiorno} exIdx={exIdx} serieIdx={serieIdx}
                imgIdx={imgIdx} setImgIdx={setImgIdx} nextEx={nextEx}
                onDone={completeSerie}
                onUpdEx={(eId, data) => updEsercizio(wGiorno.id, eId, data)}
                onSkipEx={() => { if (exIdx + 1 < wGiorno.esercizi.length) { setExIdx(e => e + 1); setSerieIdx(0); setImgIdx(0); } else setView('complete'); }}
                onBack={() => setView('home')} />
              {isResting && (
                <RestOverlay time={restTime}
                  nextSerie={serieIdx + 1 < (currEx?.serie || 0) ? { name: currEx.nome, n: serieIdx + 2 } : null}
                  nextEx={!((serieIdx + 1 < (currEx?.serie || 0))) ? nextEx : null}
                  onSkip={skipRest} />
              )}
            </>
          )}
          {view === 'complete' && (
            <CompleteView giornoName={wGiorno?.nome} totalEx={wGiorno?.esercizi.length}
              onHome={() => setView('home')} />
          )}
          {editModal && editEx && (
            <EsercizioModal esercizio={editEx}
              onSave={(data) => { updEsercizio(editModal.gId, editModal.eId, data); setEditModal(null); }}
              onDelete={() => { delEsercizio(editModal.gId, editModal.eId); setEditModal(null); }}
              onClose={() => setEditModal(null)} />
          )}
        </div>
      );
    }

    function HomeView({ schedaNome, hasGiorni, onScheda, onStart }) {
      return (
        <div className="home">
          <div className="home-logo">
            <div className="home-brand">GymTracker Pro</div>
            <div className="home-t">FORZA<br /><span className="home-t-acc">TOTALE</span></div>
            <div className="home-sub">Traccia ogni serie. Ogni ripetizione.<br />Raggiungi i tuoi obiettivi.</div>
          </div>
          <div className="home-acts">
            {hasGiorni && (
              <button className="home-btn" onClick={onStart}>
                <span>▶ Inizia Allenamento</span>
                <span style={{ fontSize: 20 }}>→</span>
              </button>
            )}
            <button className="home-btn sec" onClick={onScheda}>
              <span>📋 {schedaNome || 'La Mia Scheda'}</span>
              <span style={{ fontSize: 20 }}>→</span>
            </button>
          </div>
        </div>
      );
    }

    function SchedaView({ scheda, onBack, onUpdNome, onAdd, onDel, onSel, onStart }) {
      return (
        <div className="page">
          <div className="hdr">
            <button className="btn btn-ic" onClick={onBack} style={{ background: 'transparent' }}>←</button>
            <span className="hdr-title">La Mia Scheda</span>
            <button className="btn btn-ic" onClick={onAdd} title="Aggiungi giorno" style={{ fontSize: 20, fontWeight: 900 }}>+</button>
          </div>
          <div style={{ padding: '18px 20px 8px' }}>
            <input className="sch-name" value={scheda.nome} onChange={e => onUpdNome(e.target.value)} placeholder="Nome scheda..." />
            <div style={{ fontSize: 12, color: 'var(--tx-m)', marginTop: 5, fontWeight: 600 }}>{scheda.giorni.length} giorni di allenamento</div>
          </div>
          <div className="page-body">
            {scheda.giorni.length === 0 ? (
              <div className="empty"><div className="empty-ic">📋</div><div className="empty-t">Nessun giorno nella scheda.<br />Premi + per aggiungerne uno.</div></div>
            ) : scheda.giorni.map(g => (
              <div key={g.id} className="g-card" onClick={() => onSel(g.id)}>
                <div className="g-hdr">
                  <div>
                    <div className="g-name">{g.nome}</div>
                    <div className="g-meta">{g.esercizi.length} esercizi</div>
                  </div>
                  <button className="btn btn-ic" style={{ color: 'var(--red)', background: 'var(--red-d)' }}
                    onClick={e => { e.stopPropagation(); if (window.confirm('Eliminare questo giorno?')) onDel(g.id); }}>🗑</button>
                </div>
                {g.esercizi.length > 0 && (
                  <div className="g-tags">
                    {g.esercizi.slice(0, 4).map(e => <span key={e.id} className="tag">{e.nome.split(' ').slice(0, 2).join(' ')}</span>)}
                    {g.esercizi.length > 4 && <span className="tag" style={{ background: 'var(--s2)', color: 'var(--tx-m)', border: '1px solid var(--b)' }}>+{g.esercizi.length - 4}</span>}
                  </div>
                )}
                <div className="g-play" onClick={e => { e.stopPropagation(); onStart(g.id); }}>▶ Avvia Allenamento</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function GiornoView({ giorno, onBack, onUpdNome, onAdd, onEdit, onDel, onMove, onStart }) {
      const [showPicker, setShowPicker] = useState(false);
      const [search, setSearch] = useState('');
      const filtered = PRESETS.filter(p => p.nome.toLowerCase().includes(search.toLowerCase()) || p.cat.toLowerCase().includes(search.toLowerCase()));
      return (
        <div className="page">
          <div className="hdr">
            <button className="btn btn-ic" onClick={onBack} style={{ background: 'transparent' }}>←</button>
            <span className="hdr-title">Giorno</span>
            <button className="btn btn-ic" onClick={onStart} style={{ background: 'var(--acc-d2)', color: 'var(--acc)', fontWeight: 900 }}>▶</button>
          </div>
          <div style={{ padding: '16px 20px 8px' }}>
            <input className="sch-name" value={giorno.nome} onChange={e => onUpdNome(e.target.value)} placeholder="Nome giorno..." />
            <div style={{ fontSize: 12, color: 'var(--tx-m)', marginTop: 5, fontWeight: 600 }}>{giorno.esercizi.length} esercizi</div>
          </div>
          <div className="page-body">
            {giorno.esercizi.length === 0 ? (
              <div className="empty"><div className="empty-ic">🏋️</div><div className="empty-t">Nessun esercizio ancora.<br />Premi + per aggiungerne uno.</div></div>
            ) : giorno.esercizi.map((e, i) => (
              <React.Fragment key={e.id}>
                <div className="ex-card" style={{ borderBottom: e.superset ? 'none' : '', borderBottomLeftRadius: e.superset ? 0 : '', borderBottomRightRadius: e.superset ? 0 : '' }}>
                  <div className="ex-row">
                    <img className="ex-thumb" src={e.imgs?.[0] || PLACEHOLDER} onError={ev => { ev.target.src = PLACEHOLDER; }} alt="" />
                    <div className="ex-info" onClick={() => onEdit(e.id)}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        <div className="ex-n">{e.nome}</div>
                        {e.superset && <span className="ex-ss-badge">SUPERSET</span>}
                        {e.tipo === 'carico' && <span className="tag tag-c" style={{ fontSize: 9, padding: '1px 6px' }}>PESANTE</span>}
                        {e.tipo === 'sfinimento' && <span className="tag tag-s" style={{ fontSize: 9, padding: '1px 6px' }}>SFINIMENTO</span>}
                      </div>
                      <div className="ex-s">{e.serie}×{e.ripetizioni} rep · {e.peso > 0 ? `${e.peso} kg` : 'Peso corpo'} · {e.recupero}s rest</div>
                    </div>
                    <div className="ex-acts">
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                        <button className="btn btn-ic" style={{ fontSize: 10, height: 20, width: 28 }} onClick={() => onMove(e.id, 'up')} disabled={i === 0}>▲</button>
                        <button className="btn btn-ic" style={{ fontSize: 10, height: 20, width: 28 }} onClick={() => onMove(e.id, 'down')} disabled={i === giorno.esercizi.length - 1}>▼</button>
                      </div>
                      <button className="btn btn-ic" onClick={() => onEdit(e.id)}>✏️</button>
                    </div>
                  </div>
                </div>
                {e.superset && <div className="ex-ss-link"></div>}
              </React.Fragment>
            ))}
            <button className="btn btn-g" style={{ width: '100%', borderStyle: 'dashed', marginTop: 4, padding: '14px' }} onClick={() => setShowPicker(true)}>+ Aggiungi Esercizio</button>
          </div>
          {showPicker && (
            <div className="mb" onClick={() => setShowPicker(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                  <div className="m-title" style={{ marginBottom: 0 }}>Scegli Esercizio</div>
                  <button className="btn btn-ic" onClick={() => setShowPicker(false)}>✕</button>
                </div>
                <input className="inp" placeholder="Cerca esercizio..." value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 12 }} autoFocus />
                <div className="preset-list">
                  {filtered.map(p => (
                    <div key={p.nome} className="pr-item" onClick={() => { onAdd(p); setShowPicker(false); setSearch(''); }}>
                      <img className="pr-img" src={p.imgs[0]} onError={ev => { ev.target.src = PLACEHOLDER; }} alt="" />
                      <span className="pr-n">{p.nome}</span>
                      <span className="tag">{p.cat}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function EsercizioModal({ esercizio, onSave, onDelete, onClose }) {
      const [f, setF] = useState({ ...esercizio });
      const [newUrl, setNewUrl] = useState('');
      const s = (k, v) => setF(x => ({ ...x, [k]: v }));
      const addImg = () => { if (newUrl.trim()) { s('imgs', [...(f.imgs || []), newUrl.trim()]); setNewUrl(''); } };
      return (
        <div className="mb" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <div className="m-title" style={{ marginBottom: 0 }}>Modifica Esercizio</div>
              <button className="btn btn-ic" onClick={onClose}>✕</button>
            </div>
            <div className="fg">
              <label className="lbl">Nome</label>
              <input className="inp" value={f.nome} onChange={e => s('nome', e.target.value)} />
            </div>
            <div className="fr3" style={{ marginBottom: 15 }}>
              {[['Serie', 'serie', 'number', 1], ['Ripetizioni', 'ripetizioni', 'text', null], ['Peso (kg)', 'peso', 'number', 0]].map(([l, k, t, mn]) => (
                <div key={k}>
                  <label className="lbl">{l}</label>
                  <input className="inp" type={t} value={f[k]} onChange={e => s(k, t === 'number' ? (parseFloat(e.target.value) || 0) : e.target.value)} min={mn} />
                </div>
              ))}
            </div>
            <div className="fr2">
              <div>
                <label className="lbl">Recupero (s)</label>
                <input className="inp" type="number" value={f.recupero} onChange={e => s('recupero', parseInt(e.target.value) || 60)} />
              </div>
              <div>
                <label className="lbl">Note</label>
                <input className="inp" value={f.note} onChange={e => s('note', e.target.value)} />
              </div>
            </div>
            <div style={{ marginTop: 15 }}>
              <label className="lbl">Tipo Allenamento</label>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                {[
                  ['Standard', 'standard', 'var(--s2)'],
                  ['Pesi Alti', 'carico', '#FFA000'],
                  ['Sfinimento', 'sfinimento', '#FF4444']
                ].map(([l, v, c]) => (
                  <button key={v} className="btn" 
                    style={{ 
                      fontSize: 12, padding: '10px 5px', 
                      background: f.tipo === v ? (v === 'standard' ? 'var(--s3)' : `${c}22`) : 'var(--s2)',
                      border: `1px solid ${f.tipo === v ? c : 'var(--b)'}`,
                      color: f.tipo === v ? (v === 'standard' ? 'var(--tx)' : c) : 'var(--tx-m)'
                    }}
                    onClick={() => s('tipo', v)}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ marginTop: 15, display: 'flex', gap: 15, alignItems: 'center', background: 'var(--s2)', padding: '12px 15px', borderRadius: 'var(--rs)', border: '1px solid var(--b)' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700 }}>In Superset</div>
                <div style={{ fontSize: 11, color: 'var(--tx-m)' }}>Lega con l'esercizio successivo</div>
              </div>
              <div onClick={() => s('superset', !f.superset)} style={{ 
                width: 44, height: 24, borderRadius: 20, background: f.superset ? 'var(--acc)' : 'var(--s3)', 
                position: 'relative', cursor: 'pointer', transition: 'all .2s'
              }}>
                <div style={{ 
                  position: 'absolute', top: 3, left: f.superset ? 23 : 3, width: 18, height: 18, 
                  background: f.superset ? '#000' : 'var(--tx-m)', borderRadius: '50%', transition: 'all .2s' 
                }} />
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, marginTop: 25 }}>
              <button className="btn btn-p" style={{ flex: 1 }} onClick={() => onSave(f)}>✓ Salva</button>
              <button className="btn btn-red" onClick={onDelete}>🗑</button>
            </div>
          </div>
        </div>
      );
    }

    function WorkoutView({ giorno, exIdx, serieIdx, imgIdx, setImgIdx, nextEx, onDone, onUpdEx, onSkipEx, onBack }) {
      const ex = giorno.esercizi[exIdx];
      const total = giorno.esercizi.length;
      const progress = exIdx / total + (serieIdx / (ex.serie || 1)) / total;
      const imgs = ex.imgs?.length ? ex.imgs : [];
      const curImg = imgs.length ? imgs[imgIdx % imgs.length] : null;

      const ts = useRef(0);
      const onTouchStart = (e) => { ts.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        const te = e.changedTouches[0].clientX;
        const diff = ts.current - te;
        if (Math.abs(diff) > 50) {
          if (diff > 0) setImgIdx(i => (i + 1) % imgs.length);
          else setImgIdx(i => (i - 1 + imgs.length) % imgs.length);
        }
      };
      return (
        <div className="wk">
          <div className="wk-prg"><div className="wk-prg-f" style={{ width: `${progress * 100}%` }} /></div>
          <div className="wk-hdr">
            <div className="wk-day">{giorno.nome}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span className="wk-cnt">Es. {exIdx + 1} / {total}</span>
              <button className="btn btn-ic" onClick={onBack}>✕</button>
            </div>
          </div>
          <div className="wk-body">
            <div style={{ padding: '22px 20px 6px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div className="wk-ex-name" style={{ padding: 0 }}>{ex.nome}</div>
                {ex.superset && <span className="ex-ss-badge" style={{ fontSize: 11, padding: '4px 8px' }}>SUPERSET</span>}
                {exIdx > 0 && giorno.esercizi[exIdx - 1].superset && <span className="ex-ss-badge" style={{ fontSize: 11, padding: '4px 8px' }}>SUPERSET</span>}
              </div>
              {ex.tipo === 'carico' && <div className="tag tag-c" style={{ marginTop: 8 }}>🔥 FOCUS: CARICHI ALTI</div>}
              {ex.tipo === 'sfinimento' && <div className="tag tag-s" style={{ marginTop: 8 }}>💀 FOCUS: A SFINIMENTO</div>}
            </div>
            <div className="wk-img-wrap" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{ touchAction: 'pan-y' }}>
              <img className="wk-img" src={curImg || PLACEHOLDER} onError={ev => { ev.target.src = PLACEHOLDER; }} draggable="false" />
              {imgs.length > 1 && (
                <>
                  <button className="cr-btn" style={{ left: 8 }} onClick={() => setImgIdx(i => (i - 1 + imgs.length) % imgs.length)}>‹</button>
                  <button className="cr-btn" style={{ right: 8 }} onClick={() => setImgIdx(i => (i + 1) % imgs.length)}>›</button>
                </>
              )}
            </div>
            <div className="wk-stats">
              <div className="st-box">
                <input className="st-v acc"
                  style={{ background: 'transparent', border: 'none', color: 'inherit', font: 'inherit', width: '100%', textAlign: 'center', outline: 'none' }}
                  value={ex.ripetizioni}
                  onChange={e => onUpdEx(ex.id, { ripetizioni: e.target.value })} />
                <div className="st-l">Rep</div>
              </div>
              <div className="st-box">
                <input className="st-v"
                  style={{ background: 'transparent', border: 'none', color: 'inherit', font: 'inherit', width: '100%', textAlign: 'center', outline: 'none' }}
                  type="number"
                  value={ex.peso}
                  onChange={e => onUpdEx(ex.id, { peso: parseFloat(e.target.value) || 0 })} />
                <div className="st-l">kg</div>
              </div>
              <div className="st-box">
                <input className="st-v"
                  style={{ background: 'transparent', border: 'none', color: 'inherit', font: 'inherit', width: '100%', textAlign: 'center', outline: 'none' }}
                  type="number"
                  value={ex.recupero}
                  onChange={e => onUpdEx(ex.id, { recupero: parseInt(e.target.value) || 0 })} />
                <div className="st-l">Rest</div>
              </div>
            </div>
            <div className="wk-series" style={{ padding: '20px 20px 0' }}>
              {Array.from({ length: ex.serie }, (_, i) => (
                <div key={i} className={`sp ${i < serieIdx ? 'done' : i === serieIdx ? 'curr' : 'todo'}`}>
                  {i < serieIdx ? '✓' : i + 1}
                </div>
              ))}
            </div>
            {nextEx && (
              <div className="nxt-prev">
                <img className="nxt-thumb" src={nextEx.imgs?.[0] || PLACEHOLDER} />
                <div><div className="nxt-lbl">Prossimo</div><div className="nxt-n">{nextEx.nome}</div></div>
              </div>
            )}
            <div className="wk-acts">
              <button className="btn-done" onClick={onDone}>✓ Serie {serieIdx + 1} Completata</button>
            </div>
          </div>
        </div>
      );
    }

    function RestOverlay({ time, nextSerie, nextEx, onSkip }) {
      const m = Math.floor(time / 60), s = time % 60;
      return (
        <div className="rest-ov">
          <div className="rest-lbl">⏱ Recupero</div>
          <div className={`rest-t ${time <= 5 ? 'urg' : ''}`}>{m > 0 ? `${m}:${s.toString().padStart(2, '0')}` : s}</div>
          <div className="rest-nxt">
            {nextSerie ? <><div className="rest-nxt-lbl">Prossimo</div><div className="rest-nxt-n">{nextSerie.name} — {nextSerie.n}ª serie</div></> :
              nextEx ? <><div className="rest-nxt-lbl">Prossimo</div><div className="rest-nxt-n">{nextEx.nome}</div></> : null}
          </div>
          <div style={{ marginTop: 40, width: '100%', maxWidth: 200 }}>
            <button className="btn btn-g" style={{ width: '100%', padding: '15px' }} onClick={onSkip}>Salta</button>
          </div>
        </div>
      );
    }

    function CompleteView({ giornoName, totalEx, onHome }) {
      return (
        <div className="done-pg">
          <div className="done-ico">🏆</div>
          <div className="done-t">COMPLETATO!</div>
          <div className="done-s">Ottimo lavoro. Ogni ripetizione conta.</div>
          <button className="btn btn-p" onClick={onHome}>← Home</button>
        </div>
      );
    }

    // --- FINE SORGENTE GYMTRACKER ---

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GymTracker />);
  </script>
</body>

</html>
